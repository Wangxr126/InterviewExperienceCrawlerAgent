# 使用方法：
#   启动：docker compose up -d
#   停止：docker compose stop
#   彻底删除：docker compose down -v
#
# 启动后访问：
#   Neo4j 管理界面：http://localhost:7474  （用户名: neo4j  密码: wxragent2024）
#   Neo4j Bolt：bolt://localhost:7687
#   Qdrant REST API：http://localhost:6333
#   Qdrant Dashboard：http://localhost:6333/dashboard

services:
  neo4j:
    # 使用已手动拉取的镜像 tag（docker pull docker.m.daocloud.io/library/neo4j:5.26.0）
    image: docker.m.daocloud.io/library/neo4j:5.26.0
    container_name: neo4j-local
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP 管理界面
      - "7687:7687"   # Bolt 协议（Python 驱动连接）
    environment:
      - NEO4J_AUTH=neo4j/wxragent2024
      # 开启向量索引插件（GenAI Plugin）
      - NEO4J_PLUGINS=["apoc"]
      # 允许本地文件导入
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=true
      # 内存配置（本地开发用，按需调整）
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - ./backend/data/neo4j_data:/data
      - ./backend/data/neo4j_logs:/logs
      - ./backend/data/neo4j_import:/var/lib/neo4j/import
      - ./backend/data/neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    # 使用道客镜像（国内加速），直连 Docker Hub 超时时可改用此源
    image: docker.m.daocloud.io/qdrant/qdrant:latest
    container_name: qdrant-local
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./backend/data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
